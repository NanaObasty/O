<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanaObasty Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-lg p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-blue-600 tracking-tight">NanaObasty Market Place</h1>
        <div class="space-x-4">
            <a href="#" class="text-gray-600 hover:text-blue-600">Browse</a>
            <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Sell Item</a>
        </div>
    </nav>

    <header class="py-12 px-4 text-center">
        <h2 class="text-4xl font-extrabold text-gray-800">Buy and sell anything.</h2>
        <p class="text-gray-500 mt-2">The fastest way to clear your garage or find a deal.</p>
    </header>
<div class="max-w-md mx-auto mb-8 px-4">
    <input type="text" id="productSearch" onkeyup="searchProducts()" placeholder="Search for items (e.g. Camera, Phone)..." 
    class="w-full p-4 rounded-full border-2 border-blue-200 focus:border-blue-500 outline-none shadow-sm">
</div>
    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow">
            <img src="sandals1.jpg">
            <div class="p-4">
                <h3 class="font-bold text-lg">Fancy Flat Slide Sandals </h3>
                <p class="text-blue-600 font-semibold">GH₵120.00</p>
                <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-md hover:bg-black">View Details</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow">
            <img src="https://sandals2.jpg" alt="Product" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="font-bold text-lg">Loft Buckle Slide Sandals</h3>
                <p class="text-blue-600 font-semibold">GH₵75.00</p>
                <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-md hover:bg-black">View Details</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow">
            <img src="slippers.jpg" alt="Product" class="w-full h-48 object-cover">
            <div class="p-4">
                <h3 class="font-bold text-lg">Flat woman slippers</h3>
                <p class="text-blue-600 font-semibold">GH₵50.00</p>
                <button class="mt-4 w-full bg-gray-800 text-white py-2 rounded-md hover:bg-black">View Details</button>
            </div>
        </div>

    </main>
<a href="https://wa.me/233539547368?text=Hello!%20I'm%20interested%20in%20one%20of%20your%20products." 
   target="_blank" 
   class="fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform z-50 flex items-center justify-center">

    </svg>
    <span class="ml-2 hidden md:inline font-semibold">Chat with Seller</span>
</a>
    <script>
function searchProducts() {
    // 1. Get the text from the search bar
    let input = document.getElementById('productSearch').value.toLowerCase();
    
    // 2. Get all your product cards
    let cards = document.getElementsByClassName('product-card');

    // 3. Loop through them and hide the ones that don't match
    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
        if (title.includes(input)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>
</body>
</html>
