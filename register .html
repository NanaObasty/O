<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration | QuickTrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">
<div class="mb-6">
    <label class="block text-sm font-bold text-gray-700 mb-2">Profile Photo / Logo</label>
    <div class="flex items-center justify-center w-full">
        <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
                <p class="mb-1 text-sm text-gray-500"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                <p class="text-xs text-gray-400">PNG, JPG or GIF (MAX. 2MB)</p>
            </div>
            <input id="dropzone-file" type="file" name="upload" class="hidden" accept="image/*" />
        </label>
    </div>
</div>
    <div class="max-w-2xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-900">Become a Seller</h1>
            <p class="text-gray-500 mt-2">Fill in your details to create your marketplace profile.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form action="https://formspree.io/f/your-id" method="POST" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" name="seller_name" required placeholder="John Doe" 
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">WhatsApp Number (with Country Code)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fab fa-whatsapp"></i>
                        </span>
                        <input type="tel" name="whatsapp" required placeholder="1234567890" 
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Business Location</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-map-marker-alt"></i>
                        </span>
                        <input type="text" name="location" required placeholder="City, State" 
                               class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Short Bio</label>
                    <textarea name="bio" rows="4" placeholder="Tell buyers what you specialize in..." 
                              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition duration-150">
                    Submit Registration
                </button>

            </form>
        </div>

        <p class="text-center text-gray-400 text-sm mt-8">
            <a href="index.html" class="hover:text-blue-600 transition underline">Back to Marketplace</a>
        </p>
    </div>

</body>
</html>
