<!DOCTYPE html>
<html lang="en">
<head>
    <script src="products.js"></script>

<script src="script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | NanaObasty.gh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 pb-20">

    <nav class="p-4 bg-white flex items-center gap-4 sticky top-0 z-50 shadow-sm">
        <a href="index.html" class="text-gray-600"><i class="fas fa-arrow-left"></i></a>
        <h1 class="font-bold text-gray-800">Product Details</h1>
    </nav>

    <div id="product-content" class="max-w-md mx-auto">
        </div>

    <div id="action-bar" class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-3 z-50">
        </div>

    <script>
        // 1. The SAME product list from your index.html
        const ghanaProducts = [
            { id: 1, name: "Kente Print Summer Dress", category: "Dresses", price: 250, location: "Koforidua", image: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800", description: "Beautiful authentic Kente print. Perfect for church or weddings. Size: Medium." },
            { id: 2, name: "Handmade Leather Sandals", category: "Sandals", price: 120, location: "Kumasi", image: "https://images.unsplash.com/photo-1603487742131-4160ec999306?w=800", description: "Durable Northern Region leather. Very comfortable for daily wear." }
            // ... Add the rest of your items here
        ];

        // 2. Logic to find the product ID from the URL
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        const product = ghanaProducts.find(p => p.id == productId);

        if (product) {
            document.getElementById('product-content').innerHTML = `
                <img src="${product.image}" class="w-full aspect-square object-cover">
                <div class="p-6">
                    <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase">${product.category}</span>
                    <h2 class="text-2xl font-black mt-2 text-gray-900">${product.name}</h2>
                    <p class="text-2xl font-black text-blue-600 mt-1 text-lg">GH₵ ${product.price}</p>
                    <p class="text-sm text-gray-500 mt-4 leading-relaxed">${product.description}</p>
                    <div class="mt-6 flex items-center gap-2 text-gray-400 text-xs">
                        <i class="fas fa-map-marker-alt"></i> Location: ${product.location}
                    </div>
                </div>
                <div class="px-6 py-10 bg-white mt-4 border-t border-gray-100 mb-24">
    <h3 class="font-black text-gray-900 mb-6 flex items-center gap-2">
        <i class="fas fa-th-large text-blue-600"></i>
        You May Also Like
    </h3>
    <div id="related-grid" class="grid grid-cols-2 gap-4">
        </div>
</div>
            `;

            document.getElementById('action-bar').innerHTML = `
                <a href="https://wa.me/233XXXXXXXXX?text=I am interested in ${product.name}" class="flex-1 bg-green-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> Chat Seller
                </a>
                <a href="tel:+233XXXXXXXXX" class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fas fa-phone"></i>
                </a>
            `;
        } else {
            document.getElementById('product-content').innerHTML = "<p class='p-10 text-center'>Product not found.</p>";
        }
    </script>
</body>
</html>
